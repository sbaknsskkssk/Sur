<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum AI - Trading</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --blue: #1f6feb; --green: #238636; --red: #da3633; --text: #e6edf3; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        
        .trade-section { padding: 20px; background: var(--card); border-bottom: 1px solid #30363d; }
        .balance-card { background: linear-gradient(135deg, #238636, #2ea043); padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 15px; }
        .balance-card h2 { margin: 5px 0; font-size: 28px; }

        input, select { width: 100%; padding: 12px; margin: 8px 0; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 8px; box-sizing: border-box; }
        .activate-btn { width: 100%; padding: 15px; background: var(--blue); border: none; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }

        .log-box { margin-top: 15px; background: #010409; border: 1px dashed #30363d; padding: 12px; border-radius: 8px; min-height: 60px; font-size: 13px; }
        
        /* قائمة البوتات الـ 9 */
        .bots-grid { padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .bot-item { background: var(--card); padding: 15px; border-radius: 10px; border: 1px solid #30363d; text-align: center; }
        .bot-item h4 { margin: 0; color: #58a6ff; }
        .bot-item span { font-size: 11px; color: #8b949e; display: block; margin: 5px 0; }
        
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #30363d; }
        .nav-item { color: #8b949e; font-size: 11px; text-align: center; cursor: pointer; }
        .active-nav { color: var(--blue); }
    </style>
</head>
<body>

    <div class="trade-section">
        <div class="balance-card">
            <span>إجمالي الرصيد</span>
            <h2 id="main-balance">1000.00$</h2>
        </div>
        
        <label>المبلغ للتداول:</label>
        <input type="number" id="trade-amount" placeholder="أدخل مبلغ الصفقة..." value="10">
        
        <label>اختر البوت المفعّل:</label>
        <select id="active-bot-select">
            <option value="16">بوت 1 (قوة 16%)</option>
            <option value="30">بوت 2 (قوة 30%)</option>
            </select>

        <button class="activate-btn" onclick="runTradeBot()">تشغيل البوت ⚡</button>

        <div id="response-log" class="log-box">بانتظار تفعيل البوت...</div>
    </div>

    <div id="market" class="bots-grid">
        </div>

    <div class="nav-bar">
        <div class="nav-item active-nav">🏠<br>التداول</div>
        <div class="nav-item">👥<br>الفريق</div>
        <div class="nav-item">💰<br>السحب</div>
        <div class="nav-item">👤<br>الحساب</div>
    </div>

    <script>
        // توليد البوتات الـ 9 تلقائياً
        const market = document.getElementById('market');
        for(let i=1; i<=9; i++) {
            const price = i * 10;
            const power = 10 + (i * 6);
            market.innerHTML += `
                <div class="bot-item">
                    <h4>بوت ${i}</h4>
                    <span>السعر: ${price}$</span>
                    <span>القوة: ${power}%</span>
                    <button class="buy-btn" style="background:var(--blue); border:none; color:white; padding:5px 10px; border-radius:4px;" onclick="buyBot(${i}, ${price})">شراء</button>
                </div>
            `;
        }

        async function runTradeBot() {
            const log = document.getElementById('response-log');
            const amount = document.getElementById('trade-amount').value;
            const power = document.getElementById('active-bot-select').value;

            log.innerHTML = "جاري سحب الأسعار وتحليل السوق...";
            
            try {
                const res = await fetch('/api/trade', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ amount: parseFloat(amount), botPower: parseInt(power) })
                });
                const data = await res.json();
                
                setTimeout(() => {
                    log.innerHTML = `<span style="color:${data.message.includes('✅') ? '#39d353' : '#f85149'}">${data.message}</span>`;
                    document.getElementById('main-balance').innerText = data.newBalance + "$";
                }, 1500);
            } catch(e) { log.innerText = "خطأ في الاتصال بالسيرفر"; }
        }

        function buyBot(level, price) {
            alert(`طلب شراء بوت مستوى ${level} بمبلغ ${price}$ قيد المعالجة...`);
        }
    </script>
</body>
</html>
