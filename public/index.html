<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum AI Platform</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --blue: #1f6feb; --green: #238636; --text: #e6edf3; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding-bottom: 70px; }
        .header { background: var(--card); padding: 15px; text-align: center; border-bottom: 1px solid #30363d; }
        .page { display: none; padding: 20px; }
        .active { display: block; }
        
        /* كروت البوتات */
        .bot-card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; }
        .bot-info h4 { margin: 0; color: #58a6ff; }
        .bot-info p { margin: 5px 0; font-size: 12px; color: #8b949e; }
        .buy-btn { background: var(--blue); border: none; color: white; padding: 8px 15px; border-radius: 5px; cursor: pointer; }

        /* شريط التنقل السفلي */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #30363d; }
        .nav-item { color: #8b949e; text-decoration: none; font-size: 12px; text-align: center; cursor: pointer; }
        .nav-item.active-nav { color: var(--blue); }

        .balance-box { background: linear-gradient(135deg, #238636, #2ea043); padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <h3 id="page-title">الرئيسية</h3>
    </div>

    <div id="home" class="page active">
        <div class="balance-box">
            <span>إجمالي الرصيد</span>
            <h2 id="user-balance">1000.00$</h2>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="buy-btn" style="flex: 1; background: var(--green);" onclick="showPage('deposit')">إيداع</button>
            <button class="buy-btn" style="flex: 1; background: #da3633;" onclick="showPage('withdraw')">سحب</button>
        </div>
    </div>

    <div id="trade" class="page">
        <div id="bots-list">
            <div class="bot-card">
                <div class="bot-info">
                    <h4>بوت المستوى 1</h4>
                    <p>السعر: 10$ | صفقات: 2 يومياً | القوة: 16%</p>
                </div>
                <button class="buy-btn" onclick="buyBot(1, 10)">شراء</button>
            </div>
            </div>
    </div>

    <div id="team" class="page">
        <h3>فريقك الاستثماري</h3>
        <p>رابط الإحالة الخاص بك:</p>
        <code id="ref-link">quantum.trade/ref/ali-salem</code>
        <div class="bot-card" style="margin-top: 20px;">
            <p>أعضاء الفريق: 0</p>
            <p>أرباح الفريق: 0.00$</p>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item" onclick="showPage('home')">🏠<br>الرئيسية</div>
        <div class="nav-item" onclick="showPage('trade')">🤖<br>البوتات</div>
        <div class="nav-item" onclick="showPage('team')">👥<br>الفريق</div>
        <div class="nav-item" onclick="showPage('account')">👤<br>الحساب</div>
    </div>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            // تحديث العنوان
            const titles = {home: 'الرئيسية', trade: 'سوق البوتات', team: 'نظام الإحالة', account: 'الملف الشخصي'};
            document.getElementById('page-title').innerText = titles[pageId] || 'Quantum';
        }

        function buyBot(level, price) {
            alert(`سيتم خصم ${price}$ لتفعيل بوت المستوى ${level}`);
            // هنا نرسل طلب للسيرفر
        }
    </script>
</body>
</html>
